# Pre-commit hooks for Tree-sitter Analyzer
# Install: uv add --dev pre-commit && uv run pre-commit install

repos:
  # Python code formatting - disabled in favor of ruff-format
  # - repo: https://github.com/psf/black
  #   rev: 24.10.0
  #   hooks:
  #     - id: black
  #       language_version: python3
  #       args: [--line-length=88]

  # Python linting and code quality
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: ^examples/.*\.(json|summary\.json)$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: ^tests/.*/_.*\.py$|^tests/integration/formatters/(cross_version_compatibility|format_monitor|generate_compatibility_report|update_baselines|validate_golden_masters|format_assertions|integration_tests|format_contract_tests|comprehensive_test_suite|enhanced_assertions|cross_component_tests|schema_validation|specification_compliance_tests|performance_tests|performance_tests_helpers|performance_tests_tests|generate_regression_report|golden_master|end_to_end_tests)\.py$|^tests/integration/workflows/validate_.*\.py$|^tests/fixtures/.*\.py$

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        # pass_filenames defaults to true, so bandit only scans the files
        # pre-commit hands it (staged files). Do NOT add a blanket
        # `-r tree_sitter_analyzer` arg — that scans the whole tree and
        # blocks commits on pre-existing untracked-file violations.
        exclude: ^tests/|^openspec/changes/archive/|^scripts/|^build_standalone\.py$|^check_quality\.py$|^run_regression_tests\.py$|^test_fixes\.py$|^upload_interactive\.py$|^upload_to_pypi\.py$|^examples/
        args: [--format, json, -c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        # --follow-imports=silent: type-check imported modules silently —
        #   errors only surface on the files pre-commit passes in (the
        #   staged set). Without this, mypy walks the whole module tree
        #   from any staged file and blocks commits on pre-existing
        #   problems in unrelated untracked files (which forced a
        #   --no-verify earlier this week).
        # --no-incremental: skip mypy's per-file cache so stale cache
        #   entries from a prior whole-tree run don't poison a scoped
        #   per-file run.
        args:
          - --ignore-missing-imports
          - --no-error-summary
          - --show-error-codes
          - --explicit-package-bases
          - --follow-imports=silent
          - --no-incremental
        exclude: ^(examples/|scripts/|compatibility_test/|collect_project_metrics\.py|test_emergency_fix\.py|debug_async_test\.py|run_regression_tests\.py|generate_golden_masters\.py|check_stability\.py|analyze_specific_sql\.py|upload_interactive\.py|regenerate_with_normalization\.py|llm_code_checker\.py|run_coverage\.py|analyze_coverage_json\.py|verify_workflow_structure\.py|validate_workflows\.py|profile_analysis\.py|upload_to_pypi\.py|check_quality\.py|test_fixes\.py|\.kiro/|openspec/)
        additional_dependencies: [
          types-psutil>=5.9.0,
          types-cachetools,
          types-PyYAML,
          types-toml,
          types-requests,
          types-jsonschema,
        ]

  # Documentation checks - temporarily disabled for commit
  # - repo: https://github.com/pycqa/pydocstyle
  #   rev: 6.3.0
  #   hooks:
  #     - id: pydocstyle
  #       args: [--convention=google, --add-ignore=D100,D101,D102,D103,D104,D105,D107]
  #       exclude: ^(tests/|examples/)

  # Python modernization
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  # Additional linting - temporarily disabled for commit
  # - repo: https://github.com/PyCQA/flake8
  #   rev: 7.1.1
  #   hooks:
  #     - id: flake8
  #       args: [--max-line-length=88, --extend-ignore=E203,W503,E501]
  #       additional_dependencies: [
  #         flake8-bugbear,
  #         flake8-comprehensions,
  #         flake8-simplify,
  #       ]

  # Workflow consistency tests
  - repo: local
    hooks:
      - id: weak-assertion-ratchet
        name: Weak Assertion Ratchet
        entry: uv run python scripts/check_loose_assertions.py --staged
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$
        stages: [pre-commit]

      - id: workflow-consistency-tests
        name: Workflow Consistency Tests
        entry: uv run pytest tests/integration/workflows/test_workflow_properties.py -v --tb=short
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.yml$
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: tsa-codemap-sync
        name: tsa-codemap-sync — block commits with registry change but no codemap update
        entry: bash scripts/codemap-sync-check.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

  # T-1 gate: reject new test files with banned name patterns (CLAUDE.md §T-1).
  - repo: local
    hooks:
      - id: block-banned-test-names
        name: block-banned-test-names (T-1)
        entry: scripts/check-test-file-names.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

  # Block local development artifacts from being committed.
  # Catches: threads/ (SDLC work logs), REDESIGN_PROPOSAL.md.
  # To add more patterns, edit scripts/check-local-artifacts.sh.
  - repo: local
    hooks:
      - id: block-local-artifacts
        name: block-local-artifacts
        entry: scripts/check-local-artifacts.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

  # Defense against incidents catalogued in docs/POSTMORTEM_v1.13.md.
  - repo: local
    hooks:
      - id: tsa-ps-ascii
        name: "tsa-ps-ascii — block non-ASCII in `shell: powershell` run blocks"
        entry: uv run python scripts/check_ps_ascii.py
        language: system
        pass_filenames: false
        files: ^\.github/(workflows|actions)/.*\.ya?ml$
        stages: [pre-commit]

  # actionlint — validates `.github/workflows/*.yml` for GitHub Actions
  # specifics: dead `uses:` refs, bad expression syntax, mis-typed
  # inputs. Catches the failure class behind PR #138 (auto-sprint
  # `@v1` ref to a non-existent action tag).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        # actionlint speaks YAML + GH-Actions schema. We pin the
        # version so a downstream actionlint release can't suddenly
        # break the wheel of every contributor.
        files: ^\.github/workflows/.*\.ya?ml$

# Configuration
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.0.0"
