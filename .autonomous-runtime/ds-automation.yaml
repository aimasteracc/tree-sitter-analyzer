# =============================================================================
# DeepSeek TUI: tree-sitter-analyzer 全自动开发 Automation
# 
# 对标 Claude Code 版本: 3-Agent GAN 循环 + 永续循环 + 7 防御模式
# 用 DS TUI 原生能力实现: automation_create + task_create + checklist
# =============================================================================

# 创建自动化任务: 每 30 分钟执行一次开发循环
# DS TUI 命令: /automation-create ts-analyzer-autonomous-loop

name: "ts-analyzer-autonomous-loop"
prompt: |
  你正在执行 tree-sitter-analyzer 全自动开发（DeepSeek TUI 版本）。
  项目路径: /Users/aisheng.yu/git-private/tree-sitter-analyzer
  
  ## 强制执行流程（不可跳过）
  
  1. **检查计划**: 读取 .autonomous-runtime/task_plan.md，确定当前 Phase
  
  2. **wiki 知识注入**: 搜索 /Users/aisheng.yu/wiki 中与当前 Phase 相关的知识
     例如 Phase 7（可视化）→ 搜索 codeflow/依赖图/健康评分
  
  3. **竞品否决检查**: 搜索 ESLint/Ruff/SonarQube 等外部工具是否已包含这项功能
     如果竞品完全覆盖 → 跳过此功能，记录到 findings.md
  
  4. **创建 OpenSpec change**（如果选择实现）:
     - 创建 openspec/changes/<feature-name>/
     - 写 tasks.md（拆分为 3-5 个子任务）
     - 先完成 MVP（最小可用版本）
  
  5. **TDD 实现**（每个子任务）:
     - 先写测试（红）
     - 再写实现（绿）
     - 重构（保持代码干净）
  
  6. **质量门禁**:
     - ruff check --fix
     - pytest -q 确认全部通过
     - test_mastery_scan.py 确认无新违规
  
  7. **Git 提交**:
     - git add -A
     - git commit -m "feat: <简短描述>"
     - git push origin $(git branch --show-current)
  
  8. **更新进度**: 在 task_plan.md 标记完成状态，在 findings.md 记录发现
  
  ## 失败模式防御（7 条铁律）
  
  - **一次只做一件事**: 一个 sprint 只做一个 OpenSpec change
  - **永远不写"全部完成"**: 始终有下一 Phase 待完成
  - **先写测试再写代码**: /tdd 模式，垂直切片
  - **不跳过分步**: 不能跳过步骤 1-8 中的任何一步
  - **代码最少 50 行**: 如果 sprint 产出少于 50 行净代码，必须加功能
  - **不回退已完成**: Phase 标记为 [x] 后不再修改，除非修复 bug
  - **Wiki 知识为灵感，不为权威**: wiki 是参考，竞品和用户需求是验证
  
  ## 停止条件
  
  当以下条件同时满足时自动停止:
  - 所有 Phase 标记为 [x]
  - 最近 5 次 git 提交中 .py 变更 < 3 个
  - test_mastery_scan.py --gates 全部通过
  
  ## 现在开始
  
  读取 task_plan.md 确定当前 work item，然后从步骤 1 开始。

rrule: "FREQ=HOURLY;INTERVAL=1"
cwds: ["/Users/aisheng.yu/git-private/tree-sitter-analyzer"]
paused: true
