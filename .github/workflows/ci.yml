# CI Workflow
# Purpose: Continuous Integration for all branches
# High-level coordinator using reusable workflows

name: CI

on:
  push:
    branches: [ main, develop, hotfix/*, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  route:
    name: Route CI
    runs-on: ubuntu-latest
    outputs:
      run_quality: ${{ steps.route.outputs.run_quality }}
      run_test_matrix: ${{ steps.route.outputs.run_test_matrix }}
      run_build: ${{ steps.route.outputs.run_build }}
      run_docs_check: ${{ steps.route.outputs.run_docs_check }}
      run_e2e_smoke: ${{ steps.route.outputs.run_e2e_smoke }}
      run_regression: ${{ steps.route.outputs.run_regression }}
      regression_scope: ${{ steps.route.outputs.regression_scope }}
      run_sql_platform_compat: ${{ steps.route.outputs.run_sql_platform_compat }}
      full_suite_required: ${{ steps.route.outputs.full_suite_required }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed-files.txt
          elif [[ "${{ github.event.before || '' }}" != "" && "${{ github.event.before || '' }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          else
            git diff --name-only HEAD~1 HEAD > changed-files.txt
          fi
          cat changed-files.txt
        shell: bash

      - name: Route jobs
        id: route
        run: python3 scripts/ci_route.py --files changed-files.txt --github-output "$GITHUB_OUTPUT"
        shell: bash

  docs-check:
    name: Docs Check
    needs: route
    if: needs.route.outputs.run_docs_check == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install (all extras)
        run: uv sync --all-extras
      # Docs-only change: skip the heavy matrix, but still run EVERY doc-anchor
      # contract — the split contract/governance suites guard README counts AND the
      # AGENTS.md / GITFLOW.md / CLAUDE.md anchors (deleting the GitFlow link
      # from AGENTS.md must still fail), plus the README structure test. These
      # are fast file-read assertions, so a prose edit is validated against all
      # documented contracts without the Win/macOS matrix.
      - name: Doc contract + structure guard
        run: |
          uv run pytest -q \
            tests/contracts/ \
            tests/governance/ \
            tests/integration/docs/test_readme_structure.py

  quality-check:
    name: Code Quality
    needs: route
    if: needs.route.outputs.run_quality == 'true'
    uses: ./.github/workflows/reusable-quality.yml
    secrets: inherit  # pragma: allowlist secret

  test:
    name: Test Suite
    needs: [route, quality-check]
    if: needs.route.outputs.run_test_matrix == 'true'
    uses: ./.github/workflows/reusable-test.yml
    with:
      matrix-profile: ${{ github.event_name == 'pull_request' && 'pr' || 'full' }}
    secrets: inherit  # pragma: allowlist secret

  build:
    name: Build Verification
    needs: [route, test]
    if: needs.route.outputs.run_build == 'true'
    uses: ./.github/workflows/reusable-build.yml

  e2e:
    name: E2E Tests (MCP black-box)
    needs: [route, quality-check]
    if: needs.route.outputs.run_e2e_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Setup System Dependencies
        uses: ./.github/actions/setup-system
        with:
          os: ubuntu-latest

      - name: Install dependencies
        run: uv sync --all-extras
        shell: bash

      - name: Run E2E smoke tests
        run: |
          echo "### E2E Test Results" >> $GITHUB_STEP_SUMMARY
          uv run pytest tests/e2e/ -m e2e \
            --override-ini="addopts=--strict-markers --verbose --tb=short" \
            --timeout=60 -v > e2e-output.txt 2>&1 || touch e2e_failed
          cat e2e-output.txt
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 25 e2e-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f e2e_failed ]; then
            echo "E2E tests failed — see above for server stderr output." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

  regression:
    name: Regression Tests
    needs: [route, test]
    if: needs.route.outputs.run_regression == 'true'
    uses: ./.github/workflows/regression-tests.yml
    with:
      test-scope: ${{ needs.route.outputs.regression_scope }}

  sql-platform-compat:
    name: SQL Platform Compatibility
    needs: [route, test]
    if: needs.route.outputs.run_sql_platform_compat == 'true'
    uses: ./.github/workflows/sql-platform-compat.yml

  quality-gate:
    name: Quality Gate
    needs: [route, docs-check, test, quality-check, build, e2e, regression, sql-platform-compat]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Overall Status
        run: |
          echo "### 🏆 Final Quality Gate Status" >> $GITHUB_STEP_SUMMARY
          SUCCESS=true

          check_required() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "❌ ${name} failed: ${result}" >> $GITHUB_STEP_SUMMARY
              SUCCESS=false
            fi
          }

          # Routed jobs: a deliberate ``skipped`` (the route turned the job off)
          # is acceptable; only ``failure``/``cancelled`` rejects the gate.
          check_routed() {
            local name="$1"
            local result="$2"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ ${name} failed: ${result}" >> $GITHUB_STEP_SUMMARY
              SUCCESS=false
            else
              echo "✅ ${name}: ${result}" >> $GITHUB_STEP_SUMMARY
            fi
          }

          check_optional() {
            check_routed "$1" "$2"
          }

          ROUTE="${{ needs.route.result }}"
          DOCS="${{ needs.docs-check.result }}"
          TEST="${{ needs.test.result }}"

          check_required "Route CI" "$ROUTE"
          # quality/test/build are skipped on a docs-only change; docs-check
          # runs instead. Each is rejected only on a real failure.
          check_routed "Docs Check" "$DOCS"
          check_routed "Quality Checks" "${{ needs.quality-check.result }}"
          check_routed "Test Suite" "$TEST"
          check_routed "Build Verification" "${{ needs.build.result }}"
          check_optional "E2E Tests" "${{ needs.e2e.result }}"
          check_optional "Regression Tests" "${{ needs.regression.result }}"
          check_optional "SQL Platform Compatibility" "${{ needs.sql-platform-compat.result }}"

          # Belt-and-suspenders: SOMETHING substantive must have run. Reject a
          # run where neither the test matrix nor the docs-check executed (guards
          # against a route misfire that skips everything).
          if [[ "$TEST" == "skipped" && "$DOCS" == "skipped" ]]; then
            echo "❌ Neither Test Suite nor Docs Check ran — route misfire?" >> $GITHUB_STEP_SUMMARY
            SUCCESS=false
          fi

          if [ "$SUCCESS" = true ]; then
            echo "✅ All systems go! This version meets our authority standards." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Quality Gate rejected this version." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
