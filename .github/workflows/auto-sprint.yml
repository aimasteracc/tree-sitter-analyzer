## Auto-Sprint: dogfood the analyzer against itself, file a sprint plan as an
## issue every day. Discovers work — does NOT write code.
##
## Safety design:
##   - read-only across the repo working tree
##   - never commits or pushes
##   - never passes --dangerously-skip-permissions or --no-verify
##   - uses `gh issue` with the default GITHUB_TOKEN (issue:write only)
##
## Manual trigger: workflow_dispatch (recommended for first runs).
## Cron: 02:00 UTC daily.

name: Auto-Sprint

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      max_items:
        description: "Max backlog work items"
        default: "10"
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: auto-sprint
  cancel-in-progress: false

jobs:
  plan:
    name: Generate sprint plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen --no-dev

      - name: Run auto-review
        id: review
        run: |
          set -euo pipefail
          MAX_ITEMS="${{ github.event.inputs.max_items || '10' }}"
          mkdir -p artifacts
          # auto_review exits 1 when work was found — that is expected; do not fail the job.
          uv run python scripts/auto_review.py \
              --max-items "$MAX_ITEMS" \
              --out artifacts/auto-review.json \
              || rc=$?
          rc=${rc:-0}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ ! -f artifacts/auto-review.json ]; then
            echo "::error::auto_review did not produce a plan"
            exit 1
          fi

      - name: Render markdown report
        id: render
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json, os, textwrap
          plan = json.loads(open("artifacts/auto-review.json").read())
          lines = []
          lines.append(f"# Auto-Sprint plan — {plan['generated_at_utc']}")
          lines.append("")
          lines.append("Generated by `scripts/auto_review.py` (no commits, no pushes).")
          lines.append("")
          s = plan["summary"]
          lines.append(f"- **Work items:** {s['work_item_count']}")
          lines.append(f"- **Weakest dimension:** {s['weakest_dimension'] or '—'}")
          lines.append(f"- **Highest priority:** {s['highest_priority'] or '—'}")
          lines.append("")
          lines.append("## Backlog")
          lines.append("")
          for it in plan["work_items"]:
              p = " · ".join(
                  f"{x['type']} L{x['line']}" for x in it["patterns"]
              ) or "—"
              lines.append(
                  f"- **{it['grade']}** ({it['score']:.1f}) · "
                  f"`{it['file_path']}` · weakest = `{it['weakest_dimension']}` · "
                  f"signals = `{it['signal']}` · patterns = {p}"
              )
          lines.append("")
          lines.append("## Next action")
          lines.append("")
          lines.append("> " + plan["next_action_hint"])
          lines.append("")
          lines.append("Full JSON plan attached as workflow artifact `auto-review-plan`.")
          out = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              # multi-line GH Actions output uses heredoc syntax
              f.write("body<<__EOF__\n")
              f.write(out)
              f.write("\n__EOF__\n")
          open("artifacts/auto-review.md", "w").write(out)
          PY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-review-plan
          path: artifacts/

      - name: Upsert sprint-plan issue
        if: steps.review.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Auto-Sprint: daily backlog ($(date -u +%Y-%m-%d))"
          BODY_FILE="artifacts/auto-review.md"
          # Reuse a single open 'auto-sprint' issue if one exists; else open a new one.
          EXISTING=$(gh issue list --label auto-sprint --state open --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING:-}" ]; then
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
            gh issue edit "$EXISTING" --title "$TITLE"
          else
            gh label create auto-sprint --description "Auto-generated sprint plans" --color FBCA04 --force || true
            gh issue create --title "$TITLE" --label auto-sprint --body-file "$BODY_FILE"
          fi

      - name: No work found
        if: steps.review.outputs.rc == '0'
        run: echo "Health is clean — no sprint plan to file. 🎉"
