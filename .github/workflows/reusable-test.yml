# Reusable Test Workflow
#
# Purpose: Comprehensive test suite for all branches
# Triggers: Called by branch-specific workflows
# Jobs:
#   - unit-tests: Fast unit tests across OS/Python matrix
#   - integration-tests: Slower integration tests on Ubuntu only
# Secrets:
#   - CODECOV_TOKEN: Optional; used for Codecov uploads when available

name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for coverage upload'
        required: false
        default: '3.11'
        type: string

      upload-coverage:
        description: 'Whether to upload coverage to Codecov'
        required: false
        default: true
        type: boolean

    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # Reduce matrix size - only test edge Python versions on non-Linux
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Setup System Dependencies
      uses: ./.github/actions/setup-system
      with:
        os: ${{ matrix.os }}

    - name: Install dependencies
      run: uv sync --all-extras
      shell: bash

    - name: Run Unit Tests
      run: |
        uv run pytest tests/unit/ -n auto -v --tb=short --maxfail=5
      shell: bash

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Setup System Dependencies
      uses: ./.github/actions/setup-system
      with:
        os: ubuntu-latest

    - name: Install dependencies
      run: uv sync --all-extras
      shell: bash

    - name: Run Integration Tests with Coverage
      if: matrix.python-version == inputs.python-version
      run: |
        echo "### 📊 Integration Test Report" >> $GITHUB_STEP_SUMMARY
        uv run pytest tests/integration/ -n auto -v --tb=short --maxfail=10 \
          --cov=tree_sitter_analyzer --cov-report=xml --cov-report=term-missing \
          > pytest-output.txt 2>&1 || touch test_failed

        cat pytest-output.txt
        echo '```text' >> $GITHUB_STEP_SUMMARY
        tail -n 20 pytest-output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        if [ -f test_failed ]; then
          echo "❌ Tests failed!" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
      shell: bash

    - name: Run Integration Tests (no coverage)
      if: matrix.python-version != inputs.python-version
      run: |
        uv run pytest tests/integration/ -n auto -v --tb=short --maxfail=10
      shell: bash

    - name: Upload coverage to Codecov
      if: inputs.upload-coverage && matrix.python-version == inputs.python-version
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        flags: unittests
        name: codecov-umbrella

    - name: Update README statistics
      if: matrix.python-version == inputs.python-version
      run: |
        echo "Updating README statistics..."
        uv run python scripts/update_readme_stats.py || echo "README stats update completed with warnings"
      shell: bash
