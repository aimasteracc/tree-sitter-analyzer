# Release Branch Automation
# Automated testing, building, and deployment for release branches

name: Release Branch Automation

on:
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Validate Release
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.11"
      upload-coverage: true
      matrix-profile: "full"
    secrets: inherit # pragma: allowlist secret

  build:
    name: Prepare Distribution
    needs: test
    uses: ./.github/workflows/reusable-build.yml

  publish:
    name: Deploy to PyPI
    needs: build
    uses: ./.github/workflows/reusable-publish.yml
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  create-main-pr:
    name: Finalize Release
    needs: [test, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "🚀 Release to Main: ${GITHUB_REF_NAME}" \
            --body "## 🚀 Automated Production Release
          This PR marks the completion of the release cycle for **${GITHUB_REF_NAME}**.

          ### ✅ Achievements
          - All quality standards met
          - Cross-platform tests passed
          - **Package successfully published to PyPI**

          ### 📦 Release Status
          - **Version**: ${GITHUB_REF_NAME}
          - **Environment**: Production
          - **Deployment**: Completed

          ---
          *Authoritative CI/CD Pipeline*" \
            || gh pr view "${GITHUB_REF_NAME}" --json url --jq '.url'
