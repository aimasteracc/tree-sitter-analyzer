# Release Branch Automation
# Automated testing, building, and deployment for release branches

name: Release Branch Automation

on:
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Validate Release
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.11"
      upload-coverage: true
      matrix-profile: "full"
    secrets: inherit # pragma: allowlist secret

  build:
    name: Prepare Distribution
    needs: test
    uses: ./.github/workflows/reusable-build.yml

  publish:
    name: Deploy to PyPI
    needs: build
    uses: ./.github/workflows/reusable-publish.yml
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  create-main-pr:
    name: Finalize Release
    needs: [test, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing_pr=$(
            gh pr list \
              --base main \
              --head "${GITHUB_REF_NAME}" \
              --state all \
              --json number,state,url,mergedAt \
              --jq '. as $prs | if length == 0 then empty else (sort_by(.number) | reverse | .[0] | [.number, .state, .url, (.mergedAt // "")] | @tsv) end'
          )
          if [ -n "${existing_pr}" ]; then
            IFS=$'\t' read -r pr_number pr_state pr_url pr_merged_at <<< "${existing_pr}"
            if [ "${pr_state}" = "OPEN" ]; then
              echo "Release PR already open: ${pr_url}"
              exit 0
            fi
            if [ "${pr_state}" = "MERGED" ] || [ -n "${pr_merged_at}" ]; then
              echo "Release PR already merged: ${pr_url}"
              exit 0
            fi
            echo "::error::Existing release PR #${pr_number} for ${GITHUB_REF_NAME} -> main is closed without merge: ${pr_url}. Reopen or use a new release version; refusing to treat finalization as successful."
            exit 1
          fi
          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "🚀 Release to Main: ${GITHUB_REF_NAME}" \
            --body "## 🚀 Automated Production Release
          This PR marks the completion of the release cycle for **${GITHUB_REF_NAME}**.

          ### ✅ Achievements
          - All quality standards met
          - Cross-platform tests passed
          - **Package successfully published to PyPI**

          ### 📦 Release Status
          - **Version**: ${GITHUB_REF_NAME}
          - **Environment**: Production
          - **Deployment**: Completed

          ---
          *Authoritative CI/CD Pipeline*"
