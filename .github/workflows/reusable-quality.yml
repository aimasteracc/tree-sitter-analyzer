# Reusable Quality Workflow
# Standardized Linting, Type Checking, and Security Scanning

name: Reusable Quality Workflow

on:
  workflow_call:

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Run Ruff
        run: |
          uv sync --all-extras
          uv run ruff check .
          echo "✅ Ruff linting passed" >> $GITHUB_STEP_SUMMARY

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Run MyPy
        run: |
          uv sync --all-extras
          uv run mypy tree_sitter_analyzer/
          echo "✅ MyPy type checking passed" >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Run Bandit
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          uv sync --all-extras

          # Run Bandit with explicit UTF-8 encoding
          uv run --with bandit bandit -r tree_sitter_analyzer/ -f json -o bandit-results.json || {
            echo "Bandit execution completed with non-zero exit (likely encoding issues)"
          }

          # Parse JSON results if file exists
          if [ -f bandit-results.json ]; then
            ISSUES=$(python3 -c "import json; data=json.load(open('bandit-results.json', encoding='utf-8')); print(len(data['results']))" 2>&1) || ISSUES=0

            if [ "$ISSUES" -gt 0 ] 2>/dev/null; then
              echo "❌ Bandit found $ISSUES security issue(s)" >> $GITHUB_STEP_SUMMARY
              python3 -c "
import json
with open('bandit-results.json', encoding='utf-8') as f:
    data = json.load(f)
    for issue in data['results']:
        print(f\"  - {issue['test_id']}: {issue['issue_text']} ({issue['filename']}:{issue['line_number']})\")
              " >> $GITHUB_STEP_SUMMARY || true
              exit 1
            else
              echo "✅ Bandit security scan passed (0 issues)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Bandit results file not created, assuming no issues" >> $GITHUB_STEP_SUMMARY
          fi
