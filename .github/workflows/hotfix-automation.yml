# Hotfix Branch Automation
# Automated emergency fixes and deployment

name: Hotfix Branch Automation

on:
  push:
    branches:
      - 'hotfix/*'
  workflow_dispatch:

concurrency:
  group: hotfix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Validate Hotfix
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.11"
      upload-coverage: false
      matrix-profile: "full"
    secrets: inherit # pragma: allowlist secret

  build:
    name: Prepare Distribution
    needs: test
    uses: ./.github/workflows/reusable-build.yml

  publish:
    name: Deploy Emergency Fix
    needs: build
    uses: ./.github/workflows/reusable-publish.yml
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  create-main-pr:
    name: Finalize Hotfix
    needs: [test, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing_pr=$(
            gh pr list \
              --base main \
              --head "${GITHUB_REF_NAME}" \
              --state all \
              --json number,state,url,mergedAt \
              --jq '. as $prs | if length == 0 then empty else (sort_by(.number) | reverse | .[0] | [.number, .state, .url, (.mergedAt // "")] | @tsv) end'
          )
          if [ -n "${existing_pr}" ]; then
            IFS=$'\t' read -r pr_number pr_state pr_url pr_merged_at <<< "${existing_pr}"
            if [ "${pr_state}" = "OPEN" ]; then
              echo "Hotfix PR already open: ${pr_url}"
              exit 0
            fi
            if [ "${pr_state}" = "MERGED" ] || [ -n "${pr_merged_at}" ]; then
              echo "Hotfix PR already merged: ${pr_url}"
              exit 0
            fi
            echo "::error::Existing hotfix PR #${pr_number} for ${GITHUB_REF_NAME} -> main is closed without merge: ${pr_url}. Reopen or use a new hotfix version; refusing to treat finalization as successful."
            exit 1
          fi
          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "🚨 Hotfix: ${GITHUB_REF_NAME}" \
            --body "## 🚨 Emergency Hotfix: ${GITHUB_REF_NAME}
          This PR was automatically created to finalize an emergency fix.

          ### 🐛 Fix Details
          - **Branch**: ${GITHUB_REF_NAME}
          - **Status**: **Published to PyPI**
          - **Action Required**: Merge immediately to main.

          ---
          *Authoritative CI/CD Pipeline*"
