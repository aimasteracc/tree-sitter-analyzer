# Hotfix Branch Automation
# Automated emergency fixes and deployment

name: Hotfix Branch Automation

on:
  push:
    branches:
      - 'hotfix/*'
  workflow_dispatch:

concurrency:
  group: hotfix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Validate Hotfix
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.11"
      upload-coverage: false
      matrix-profile: "full"
    secrets: inherit # pragma: allowlist secret

  build:
    name: Prepare Distribution
    needs: test
    uses: ./.github/workflows/reusable-build.yml

  publish:
    name: Deploy Emergency Fix
    needs: build
    uses: ./.github/workflows/reusable-publish.yml
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  create-main-pr:
    name: Finalize Hotfix
    needs: [test, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "🚨 Hotfix: ${GITHUB_REF_NAME}" \
            --body "## 🚨 Emergency Hotfix: ${GITHUB_REF_NAME}
          This PR was automatically created to finalize an emergency fix.

          ### 🐛 Fix Details
          - **Branch**: ${GITHUB_REF_NAME}
          - **Status**: **Published to PyPI**
          - **Action Required**: Merge immediately to main.

          ---
          *Authoritative CI/CD Pipeline*" \
            || gh pr view "${GITHUB_REF_NAME}" --json url --jq '.url'
