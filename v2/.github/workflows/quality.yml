name: Quality Checks

on:
  push:
    branches: [v2-rewrite, main]
    paths:
      - "v2/**"
      - ".github/workflows/quality.yml"
  pull_request:
    branches: [v2-rewrite, main]
    paths:
      - "v2/**"
      - ".github/workflows/quality.yml"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: v2
        run: |
          uv sync --extra dev --extra languages

      - name: Run ruff (linting)
        working-directory: v2
        run: |
          uv run ruff check tree_sitter_analyzer_v2/ tests/

      - name: Run ruff (formatting check)
        working-directory: v2
        run: |
          uv run ruff format --check tree_sitter_analyzer_v2/ tests/

      - name: Run mypy (type checking)
        working-directory: v2
        run: |
          uv run mypy tree_sitter_analyzer_v2/

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: v2
        run: |
          uv pip install bandit[toml]

      - name: Run bandit (security linting)
        working-directory: v2
        run: |
          uv run bandit -r tree_sitter_analyzer_v2/ -ll -i

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: always()
    steps:
      - name: Check quality results
        run: |
          if [ "${{ needs.quality.result }}" = "failure" ] || [ "${{ needs.security.result }}" = "failure" ]; then
            echo "Quality checks failed"
            exit 1
          fi
          echo "All quality checks passed"
