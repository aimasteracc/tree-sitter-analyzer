[pytest]
markers =
    unit: mark test as unit test
    requires_ripgrep: mark test as requiring ripgrep (rg) command
    requires_fd: mark test as requiring fd command
    integration: mark test as integration test
    performance: mark test as performance test
    benchmark: mark test as benchmark test
    slow: mark test as slow running
    network: mark test as requiring network access
    regression: mark test as regression test
    e2e: mark test as end-to-end (spawns a real MCP subprocess; excluded from the parallel unit-test matrix)
    full_language: mark exhaustive all-language golden/regression tests; CI runs these once on the Linux coverage axis, not on every OS/Python axis

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
# NOTE: --cov is intentionally NOT in addopts to prevent double-coverage when
# the user passes --cov on the command line. Use: uv run pytest --cov ...
# E2E tests spawn real MCP subprocesses and must be run separately:
#   uv run pytest -m e2e --no-header -q
# They are excluded from the default parallel run via -m "not e2e".
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --numprocesses=4
    --dist=worksteal
    -m "not e2e and not slow and not network and not full_language and not benchmark"
    --timeout=30
    --session-timeout=900
    --benchmark-disable
    --reruns=1
    --reruns-delay=1

# Minimum version
minversion = 6.0

# pytest-asyncio configuration (required for async tests with xdist)
asyncio_mode = auto

# Filter warnings
filterwarnings =
    error
    ignore::UserWarning:tree_sitter.*
    # Windows CI: pytest's unraisable-exception collector raises on
    # socket finaliser warnings (FD leaks from network test fixtures
    # plus Windows' delayed-close semantics). Downgrade to warning so
    # the matrix doesn't fail on a Windows-only post-test cleanup issue.
    ignore::pytest.PytestUnraisableExceptionWarning
    # Python 3.12+ deprecation of asyncio.get_event_loop() with no
    # running loop. Some integration tests still call it (e.g.
    # test_user_story_3_*_integration.py); the cleanup fixture in
    # conftest.py was already patched. Avoid breaking the matrix on
    # the deprecation while we audit the remaining call sites.
    ignore::DeprecationWarning:asyncio.*
