[pytest]
markers =
    unit: mark test as unit test
    requires_ripgrep: mark test as requiring ripgrep (rg) command
    requires_fd: mark test as requiring fd command
    integration: mark test as integration test
    performance: mark test as performance test
    benchmark: mark test as benchmark test
    slow: mark test as slow running
    network: mark test as requiring network access
    regression: mark test as regression test

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
# NOTE: --cov is intentionally NOT in addopts to prevent double-coverage when
# the user passes --cov on the command line. Use: uv run pytest --cov ...
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --numprocesses=auto
    --dist=loadfile
    --timeout=180
    --session-timeout=300
    --benchmark-disable
    --reruns=2
    --reruns-delay=1

# Minimum version
minversion = 6.0

# pytest-asyncio configuration (required for async tests with xdist)
asyncio_mode = auto

# Filter warnings
filterwarnings =
    error
    ignore::UserWarning:tree_sitter.*
